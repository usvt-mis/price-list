<!-- Quote Updated Success Modal -->
<div id="quoteUpdatedModal" class="quote-created-modal fixed inset-0 hidden z-50 transition-opacity duration-200">
  <div class="quote-created-dialog">
    <div id="quoteUpdatedModalContent" class="quote-created-panel overflow-hidden" style="opacity: 0; transform: translateY(-8px);">
      <div class="quote-created-header">
        <p class="quote-created-status quote-created-status-success">Updated successfully</p>
        <h2 class="quote-created-title">Sales Quote updated</h2>
        <p class="quote-created-subtitle">The changes have been sent to Business Central successfully.</p>
      </div>

      <div class="quote-created-body quote-created-body-compact">
        <section class="quote-created-card quote-created-card-primary quote-created-card-compact">
          <p class="quote-created-card-label">Sales Quote Number</p>
          <div class="quote-created-value-row">
            <p id="quoteUpdatedNumber" class="quote-created-number quote-created-number-compact">SO-12345</p>
            <button
              type="button"
              onclick="window.copyUpdatedQuoteNumber()"
              class="quote-created-copy-btn quote-created-copy-btn-light quote-created-copy-btn-inline"
              title="Copy sales quote number"
              aria-label="Copy sales quote number"
            >
              <svg id="copyUpdatedQuoteIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
              </svg>
              <svg id="copiedUpdatedQuoteIcon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
            </button>
          </div>
        </section>
      </div>

      <div class="quote-created-actions quote-created-actions-compact">
        <button
          type="button"
          class="quote-created-btn quote-created-btn-secondary quote-created-btn-compact"
          onclick="window.closeQuoteUpdatedModal()"
        >
          Close
        </button>
      </div>
    </div>
  </div>
</div>
