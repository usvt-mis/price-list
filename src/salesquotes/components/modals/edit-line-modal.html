<!-- Edit Line Modal -->
<div id="editLineModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] transition-opacity duration-300">
  <div class="flex items-center justify-center min-h-screen p-4">
    <div id="editLineModalContent" class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full transform transition-all duration-300 opacity-0 translate-y-[-10px]">
      <!-- Header -->
      <div class="p-6 border-b border-slate-200">
        <div class="flex items-center gap-3">
          <div class="flex items-center justify-center w-10 h-10 bg-indigo-50 rounded-xl">
            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
          </div>
          <div>
            <h3 class="text-lg font-semibold text-gray-900">Edit Quote Line</h3>
            <p class="text-sm text-gray-500">Modify line item details</p>
          </div>
        </div>
      </div>

      <!-- Form Content (6-column grid, same as Add Line) -->
      <div class="p-6 max-h-[calc(100vh-200px)] overflow-y-auto">
        <!-- ROW 1: Type (1), Group No (1), New SER (1), Serv. Item No (1), Serv. Item Desc (2) -->
        <div class="grid grid-cols-6 gap-4 mb-4">
          <div class="col-span-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Type <span class="required-asterisk">*</span></label>
            <select id="editLineType" class="w-full rounded-lg border-slate-200 shadow-sm px-2 py-2.5 text-sm">
              <option value="Item">Item</option>
              <option value="Comment">Comment</option>
            </select>
          </div>
          <div class="col-span-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Group No</label>
            <input type="number" id="editLineUsvtGroupNo" class="w-full rounded-lg border-slate-200 shadow-sm px-2 py-2.5 text-sm" placeholder="0">
          </div>
          <div class="col-span-1 flex items-center justify-center">
            <label class="toggle-label-vertical">
              <span class="block text-sm font-medium text-gray-700 text-center"></span>
              <button type="button" id="editLineCreateSv" class="h-8 px-3 text-xs font-semibold rounded-lg bg-gradient-to-r from-amber-500 to-orange-500 text-white hover:from-amber-600 hover:to-orange-600 shadow-md hover:shadow-lg hover:scale-105 active:scale-95 transition-all">
                New SER
              </button>
            </label>
          </div>
          <div class="col-span-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Serv. Item No</label>
            <input type="text" id="editLineUsvtServiceItemNo" class="w-full rounded-lg border-slate-200 shadow-sm px-2 py-2.5 text-sm">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Serv. Item Desc</label>
            <input type="text" id="editLineUsvtServiceItemDescription" class="w-full rounded-lg border-slate-200 shadow-sm px-2 py-2.5 text-sm">
          </div>
        </div>

        <!-- ROW 2: No (2), Desc (4) -->
        <div class="grid grid-cols-6 gap-4 mb-4">
          <div class="col-span-2 relative">
            <label class="block text-sm font-medium text-gray-700 mb-1">No. <span class="required-asterisk">*</span></label>
            <input type="text" id="editLineObjectNumberSearch" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5" readonly>
            <div id="editLineMaterialDropdown" class="search-dropdown hidden"></div>
          </div>
          <div class="col-span-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="required-asterisk">*</span></label>
            <input type="text" id="editLineDescription" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5">
          </div>
        </div>

        <!-- ROW 3: Qty (1), Unit Price (2), Disc. % (1), Discount Amt. (2) -->
        <div class="grid grid-cols-6 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Qty. <span class="required-asterisk">*</span></label>
            <input type="number" id="editLineQuantity" class="w-full rounded-lg border-slate-200 shadow-sm px-3 py-2.5" min="1">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price</label>
            <input type="number" id="editLineUnitPrice" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5" min="0" step="0.01">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Disc. %</label>
            <input type="text" id="editLineDiscountPercent" inputmode="decimal" pattern="[0-9]*\.?[0-9]{0,1}" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Discount Amt.</label>
            <input type="text" id="editLineDiscountAmount" inputmode="decimal" pattern="[0-9]*\.?[0-9]{0,2}" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5">
          </div>
        </div>

        <!-- ROW 4: Addition (1), Ref. SQ No. (2), Line Total (3) -->
        <div class="grid grid-cols-6 gap-4 mb-4">
          <div class="flex items-center justify-center">
            <label class="toggle-label-vertical">
              <span class="block text-sm font-medium text-gray-700 text-center">Addition</span>
              <label class="toggle-switch">
                <input type="checkbox" id="editLineUsvtAddition">
                <span class="toggle-slider"></span>
              </label>
            </label>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Ref. SQ No.</label>
            <input type="text" id="editLineUsvtRefSalesQuoteno" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5">
          </div>
          <div class="col-span-3 bg-gradient-to-r from-indigo-50 to-purple-50 border border-indigo-200 rounded-xl px-4 py-3">
            <div class="flex justify-between items-center">
              <span class="font-medium text-indigo-900">Line Total:</span>
              <span id="editLineTotalPreview" class="text-lg font-bold text-indigo-600">0.00</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="p-6 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 rounded-b-2xl">
        <button
          class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-500 to-indigo-600 text-white rounded-lg px-6 py-2.5 font-semibold shadow-md hover:shadow-lg hover:scale-105 active:scale-95 transition-all duration-200"
          onclick="window.saveEditLine()"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
          Save Changes
        </button>
        <button
          class="inline-flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 rounded-lg px-4 py-2.5 font-medium hover:bg-slate-50 transition-all duration-200"
          onclick="window.closeEditLineModal()"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
