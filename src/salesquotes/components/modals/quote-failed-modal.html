<!-- Quote Failed Modal -->
<div id="quoteFailedModal" class="quote-created-modal fixed inset-0 hidden z-50 transition-opacity duration-200">
  <div class="quote-created-dialog">
    <div id="quoteFailedModalContent" class="quote-created-panel quote-failed-panel transform transition-all duration-300 opacity-0 scale-95 overflow-hidden">
      <div class="quote-failed-hero">
        <span class="quote-created-badge">Send Failed</span>
        <h2 class="quote-created-title quote-failed-title">Unable to send Sales Quote</h2>
        <p class="quote-created-subtitle">
          Business Central did not accept this request. Your current quote is still on the page so you can review and try again.
        </p>
      </div>

      <div class="quote-created-body">
        <section class="quote-created-card quote-failed-card">
          <p class="quote-created-card-label quote-created-card-label-dark">Error Details</p>
          <p id="quoteFailedMessage" class="quote-failed-message">
            Failed to send quote to Business Central. Please review the data and try again.
          </p>
        </section>
      </div>

      <div class="quote-created-actions">
        <button
          type="button"
          class="quote-created-btn quote-created-btn-secondary"
          onclick="window.closeQuoteFailedModal()"
        >
          Close
        </button>
      </div>
    </div>
  </div>
</div>
