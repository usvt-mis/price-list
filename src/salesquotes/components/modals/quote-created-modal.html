<!-- Quote Created Success Modal -->
<div id="quoteCreatedModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 transition-opacity duration-300">
  <div class="flex items-center justify-center min-h-screen p-4">
    <div id="quoteCreatedModalContent" class="bg-white rounded-2xl shadow-2xl max-w-md w-full transform transition-all duration-300 opacity-0 translate-y-[-10px]">
      <!-- Success Icon & Header -->
      <div class="p-8 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-100 rounded-full mb-4">
          <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h3 class="text-2xl font-bold text-gray-900 mb-2">Sales Quote Created Successfully!</h3>
        <p class="text-sm text-gray-600">Your quote has been created in Business Central</p>
      </div>

      <!-- Quote Number Display -->
      <div class="px-8 pb-6">
        <div class="bg-gradient-to-r from-emerald-50 to-teal-50 border-2 border-emerald-200 rounded-xl p-6 text-center">
          <p class="text-sm font-medium text-emerald-700 mb-2">Quote Number</p>
          <p id="quoteCreatedNumber" class="text-3xl font-bold text-emerald-600 tracking-wide">SO-12345</p>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="p-6 border-t border-slate-200 bg-slate-50 flex justify-center rounded-b-2xl">
        <button
          class="inline-flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 rounded-lg px-8 py-3 font-medium hover:bg-slate-50 hover:border-slate-400 active:scale-95 transition-all duration-200 shadow-sm"
          onclick="window.closeQuoteCreatedModal()"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
          Close
        </button>
      </div>
    </div>
  </div>
</div>
