<!-- Quote Created Success Modal -->
<div id="quoteCreatedModal" class="quote-created-modal fixed inset-0 hidden z-50 transition-opacity duration-200">
  <div class="quote-created-dialog">
    <div id="quoteCreatedModalContent" class="quote-created-panel transform transition-all duration-300 opacity-0 scale-95 overflow-hidden">
      <div class="quote-created-body quote-created-body-compact">
        <section class="quote-created-card quote-created-card-primary quote-created-card-compact">
          <p class="quote-created-card-label">Sales Quote Number</p>
          <div class="quote-created-value-row">
            <p id="quoteCreatedNumber" class="quote-created-number quote-created-number-compact">SO-12345</p>
            <button
              type="button"
              onclick="window.copyQuoteNumber()"
              class="quote-created-copy-btn quote-created-copy-btn-light quote-created-copy-btn-inline"
              title="Copy sales quote number"
              aria-label="Copy sales quote number"
            >
              <svg id="copyQuoteIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
              </svg>
              <svg id="copiedQuoteIcon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
            </button>
          </div>
        </section>

        <section id="serviceOrderNoSection" class="quote-created-card quote-created-card-secondary quote-created-card-compact hidden">
          <p class="quote-created-card-label quote-created-card-label-dark">Service Order Number</p>
          <div id="serviceOrderCreatedNumber" class="quote-created-order-list quote-created-order-list-compact"></div>
        </section>
      </div>

      <div class="quote-created-actions quote-created-actions-compact">
        <button
          type="button"
          class="quote-created-btn quote-created-btn-secondary quote-created-btn-compact"
          onclick="window.closeQuoteCreatedModal()"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
          Close
        </button>
      </div>
    </div>
  </div>
</div>
