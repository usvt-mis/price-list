            <!-- Copy button -->

            >
              <svg id="copyQuoteIcon" class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
              </svg>
              <svg id="copiedQuoteIcon" class="w-4 h-4 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Service Order No Display (hidden by default) -->
      <div id="serviceOrderNoSection" class="px-8 pb-6 relative z-10 hidden">
        <div class="relative group">
          <!-- Gradient background -->
          <div class="absolute inset-0 bg-gradient-to-r from-blue-500 via-indigo-500 to-blue-500 rounded-2xl opacity-90 transition-all duration-300 group-hover:opacity-100 group-hover:shadow-xl group-hover:shadow-blue-500/30"></div>

          <!-- Shimmer effect -->
          <div class="absolute inset-0 rounded-2xl overflow-hidden">
            <div class="shimmer-effect"></div>
          </div>

          <!-- Content -->
          <div class="relative p-4 text-center">
            <div class="flex items-center justify-center gap-2 mb-1">
              <svg class="w-3.5 h-3.5 text-blue-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
              </svg>
              <p class="text-xs font-semibold text-blue-100 uppercase tracking-wider">Service Order No</p>
            </div>
            <p id="serviceOrderCreatedNumber" class="text-xl font-bold text-white tracking-wide tabular-nums">SVRY2512-0013</p>

            <!-- Copy button -->
            <button
              onclick="window.copyServiceOrderNumber()"
              class="absolute top-2 right-2 p-1.5 rounded-lg bg-white/20 hover:bg-white/30 transition-all duration-200 group-hover:opacity-100 opacity-60"
              title="Copy to clipboard"
            >
              <svg id="copySOIcon" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
              </svg>
              <svg id="copiedSOIcon" class="w-3.5 h-3.5 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Additional Info Cards -->
      <div id="additionalInfoSection" class="px-8 pb-5 relative z-10">
        <div class="flex gap-3">
          <!-- Quote Status Card -->
          <div class="flex-1 bg-gradient-to-br from-emerald-50 to-teal-50 border border-emerald-200/60 rounded-xl p-3 flex items-center gap-2.5">
            <div class="flex-shrink-0 w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
            </div>
            <div>
              <p class="text-xs text-gray-500">Status</p>
              <p class="text-sm font-semibold text-emerald-700">Open</p>
            </div>
          </div>

          <!-- Sync Status Card -->
          <div class="flex-1 bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-200/60 rounded-xl p-3 flex items-center gap-2.5">
            <div class="flex-shrink-0 w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
              </svg>
            </div>
            <div>
              <p class="text-xs text-gray-500">Sync</p>
              <p class="text-sm font-semibold text-blue-700">Complete</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="p-6 bg-gradient-to-r from-slate-50 to-gray-50 border-t border-slate-100 flex flex-col sm:flex-row justify-center gap-3 rounded-b-3xl relative z-10">
        <button
          class="inline-flex items-center justify-center gap-2 bg-white border border-slate-200 text-slate-700 rounded-xl px-6 py-3 font-medium hover:bg-slate-50 hover:border-slate-300 hover:shadow-md active:scale-95 transition-all duration-200"
          onclick="window.closeQuoteCreatedModal()"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
          Close
        </button>
        <button
          class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-xl px-6 py-3 font-semibold shadow-lg shadow-emerald-500/30 hover:shadow-xl hover:shadow-emerald-500/40 hover:scale-105 active:scale-95 transition-all duration-200"
          onclick="window.createNewQuote()"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          Create New Quote
        </button>

<style>
/* Checkmark Animation */
.checkmark-path {
  stroke-dasharray: 24;
  stroke-dashoffset: 24;
  animation: drawCheckmark 0.6s ease-out forwards;
  animation-delay: 0.3s;
}

@keyframes drawCheckmark {
  to {
    stroke-dashoffset: 0;
  }
}

/* Shimmer Effect */
.shimmer-effect {
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.3),
    transparent
  );
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% {
    left: -100%;
  }
  100% {
    left: 200%;
  }
}

/* Confetti Animations */
@keyframes confetti-fall {
  0% {
    transform: translateY(-20px) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(400px) rotate(720deg);
    opacity: 0;
  }
}

@keyframes confetti-sway {
  0%, 100% {
    transform: translateX(0);
  }
  50% {
    transform: translateX(20px);
  }
}

.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  opacity: 0;
  animation: confetti-fall 3s ease-in forwards, confetti-sway 2s ease-in-out infinite;
}

/* Tabular nums for number alignment */
.tabular-nums {
  font-variant-numeric: tabular-nums;
}
</style>

<script>
(function() {
  'use strict';

  // Copy quote number to clipboard
  window.copyQuoteNumber = function() {
    const quoteNumber = document.getElementById('quoteCreatedNumber')?.textContent;
    if (quoteNumber) {
      navigator.clipboard.writeText(quoteNumber).then(() => {
        // Show copied state
        document.getElementById('copyQuoteIcon')?.classList.add('hidden');
        document.getElementById('copiedQuoteIcon')?.classList.remove('hidden');

        // Reset after 2 seconds
        setTimeout(() => {
          document.getElementById('copyQuoteIcon')?.classList.remove('hidden');
          document.getElementById('copiedQuoteIcon')?.classList.add('hidden');
        }, 2000);
      });
    }
  };

  // Copy service order number to clipboard
  window.copyServiceOrderNumber = function() {
    const soNumber = document.getElementById('serviceOrderCreatedNumber')?.textContent;
    if (soNumber) {
      navigator.clipboard.writeText(soNumber).then(() => {
        // Show copied state
        document.getElementById('copySOIcon')?.classList.add('hidden');
        document.getElementById('copiedSOIcon')?.classList.remove('hidden');

        // Reset after 2 seconds
        setTimeout(() => {
          document.getElementById('copySOIcon')?.classList.remove('hidden');
          document.getElementById('copiedSOIcon')?.classList.add('hidden');
        }, 2000);
      });
    }
  };

  // Create new quote action
  window.createNewQuote = function() {
    window.closeQuoteCreatedModal();
    window.clearQuote();
  };

  // Create confetti particles
  function createConfetti() {
    const container = document.getElementById('confettiContainer');
    if (!container) return;

    const colors = ['#10b981', '#14b8a6', '#3b82f6', '#8b5cf6', '#f59e0b', '#ef4444'];
    const shapes = ['circle', 'square', 'rectangle'];

    for (let i = 0; i < 30; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';

      const color = colors[Math.floor(Math.random() * colors.length)];
      const shape = shapes[Math.floor(Math.random() * shapes.length)];
      const left = Math.random() * 100;
      const delay = Math.random() * 0.5;
      const duration = 2 + Math.random() * 1;

      confetti.style.cssText = `
        left: ${left}%;
        background: ${color};
        animation-delay: ${delay}s;
        animation-duration: ${duration}s;
        ${shape === 'circle' ? 'border-radius: 50%;' : ''}
        ${shape === 'rectangle' ? 'width: 6px; height: 12px;' : ''}
      `;

      container.appendChild(confetti);

      // Remove after animation
      setTimeout(() => confetti.remove(), 4000);
    }
  }

  // Update timestamp when modal opens
  function updateTimestamp() {
    const timestampEl = document.getElementById('quoteCreatedTimestamp');
    if (timestampEl) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
      });
      timestampEl.textContent = `Today at ${timeStr}`;
    }
  }

  // Initialize confetti when modal opens
  const modal = document.getElementById('quoteCreatedModal');
  if (modal) {
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
          if (!modal.classList.contains('hidden')) {
            createConfetti();
            updateTimestamp();
          }
        }
      });
    });

    observer.observe(modal, { attributes: true });
  }
})();
</script>
