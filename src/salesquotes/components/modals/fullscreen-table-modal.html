<!-- Fullscreen Table Modal -->
<div id="fullscreenTableModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden z-50 transition-opacity duration-300">
  <div class="flex items-center justify-center min-h-screen p-2 sm:p-4">
    <div id="fullscreenTableContent" class="salesquotes-modal-shell bg-white rounded-2xl shadow-2xl w-full max-w-full h-[90vh] max-h-[calc(100vh-2rem)] flex flex-col transform transition-all duration-300 opacity-0 translate-y-[-10px]">
      <!-- Header -->
      <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-gradient-to-r from-indigo-50 to-purple-50 rounded-t-2xl">
        <div class="flex items-center gap-3">
          <div class="flex items-center justify-center w-10 h-10 bg-indigo-100 rounded-xl">
            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
            </svg>
          </div>
          <div>
            <h3 class="text-lg font-semibold text-gray-900">Quote Lines (Fullscreen)</h3>
            <p class="text-sm text-gray-500">All columns visible - Edit mode available</p>
          </div>
        </div>
        <div class="flex flex-col gap-2 sm:flex-row">
          <button
            id="resetQuoteLineColumnsBtnFullscreen"
            class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 font-medium text-slate-700 transition-all duration-200 hover:bg-slate-50 shadow-sm"
            type="button"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h5M20 20v-5h-5M5.64 18.36A9 9 0 1120 12"></path>
            </svg>
            Reset Columns
          </button>
          <button
            onclick="window.closeFullscreenTable()"
            class="inline-flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 rounded-lg px-4 py-2 font-medium hover:bg-slate-50 transition-all duration-200 shadow-sm"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
            Close
          </button>
        </div>
      </div>

      <!-- Table Container -->
      <div class="flex-1 overflow-auto p-4">
        <p class="mb-3 text-xs text-slate-500">Drag column headers to rearrange. Your layout syncs with the main table and saves automatically.</p>
        <div class="rounded-xl border border-slate-200">
          <table class="bc-table w-full">
            <thead id="fullscreenLinesTableHead"></thead>
            <tbody id="fullscreenLinesTableBody" class="divide-y divide-slate-100">
              <!-- Lines will be synced here -->
            </tbody>
          </table>
        </div>

        <!-- No lines message for fullscreen -->
        <div id="fullscreenNoLinesMessage" class="text-center py-12 hidden">
          <svg class="w-16 h-16 mx-auto text-slate-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
          </svg>
          <p class="text-gray-500 font-medium">No line items added</p>
          <p class="text-sm text-gray-400 mt-1">Click "Add Line" to add items to your quote</p>
        </div>
      </div>

      <!-- Footer with Quick Actions -->
      <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 rounded-b-2xl">
        <div class="flex justify-between items-center">
          <div class="flex gap-2">
            <button class="flex items-center gap-2 text-sm text-indigo-600 hover:text-indigo-800 font-medium px-3 py-2 rounded-lg hover:bg-indigo-50 transition-all duration-200" onclick="window.openAddLineModal()">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              Add Line
            </button>
            <button class="flex items-center gap-2 text-sm text-emerald-600 hover:text-emerald-800 font-medium px-3 py-2 rounded-lg hover:bg-emerald-50 transition-all duration-200" onclick="window.openInsertLineModal(0)">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              Insert at Start
            </button>
          </div>
          <div class="text-sm text-gray-500">
            Press <kbd class="px-2 py-1 bg-slate-200 rounded text-xs">ESC</kbd> to close
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
