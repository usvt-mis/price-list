<!--
  Sales Quote Approval Preview Modal
  Fullscreen modal for Sales Directors to preview and approve/reject quotes
-->
<dialog
  id="approvalPreviewModal"
  class="approval-preview-dialog opacity-0 transition-opacity duration-300"
  aria-labelledby="approvalPreviewTitle"
>
  <div class="approval-preview-frame flex min-h-screen items-stretch justify-stretch p-0">
    <div class="salesquotes-modal-shell sq-modal-panel approval-preview-panel flex w-full max-w-full flex-col rounded-none border-0 shadow-none" style="height: calc(100vh - 1.5rem); max-height: calc(100vh - 1.5rem);">
      <!-- Modal Header -->
      <div class="sq-modal-header approval-preview-header flex items-start justify-between gap-4">
        <div class="approval-preview-header-main">
          <div class="approval-preview-header-copy">
            <p class="text-[11px] font-semibold uppercase tracking-[0.12em] text-slate-500">Approval Preview</p>
            <h2 id="approvalPreviewTitle" class="text-base font-semibold text-slate-900">
              Sales Quote Approval
            </h2>
            <p id="approvalPreviewSubtitle" class="mt-1 text-sm text-slate-600">
              Review layout aligned closer to the print version
            </p>
          </div>
          <div id="approvalPreviewHeaderMeta" class="approval-preview-header-meta" aria-live="polite">
            <div class="approval-preview-header-status">
              <span class="approval-preview-header-status-label">Status</span>
              <span class="approval-preview-header-status-badge bg-slate-100 text-slate-600">Loading...</span>
            </div>
          </div>
        </div>
        <button
          type="button"
          id="btnCloseApprovalPreview"
          class="sq-icon-btn"
          aria-label="Close"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Modal Content (Quote Preview) -->
      <div id="approvalPreviewContent" class="approval-preview-content flex-1">
        <!-- Quote content will be loaded here -->
      </div>

      <!-- Modal Actions -->
      <div id="approvalPreviewActions" class="approval-preview-actions">
        <!-- Action buttons will be rendered here -->
      </div>
    </div>
  </div>
</dialog>

<script type="module">
  import { closeApprovalPreviewModal } from '../../../../js/salesquotes/approvals.js';

  // Close button handler
  const closeBtn = document.getElementById('btnCloseApprovalPreview');
  if (closeBtn) {
    closeBtn.addEventListener('click', closeApprovalPreviewModal);
  }

  // Close on backdrop click
  const modal = document.getElementById('approvalPreviewModal');
  if (modal) {
    modal.addEventListener('cancel', (e) => {
      e.preventDefault();
      closeApprovalPreviewModal();
    });
    modal.addEventListener('click', (e) => {
      const rect = modal.getBoundingClientRect();
      const isInDialog =
        rect.top <= e.clientY &&
        e.clientY <= rect.top + rect.height &&
        rect.left <= e.clientX &&
        e.clientX <= rect.left + rect.width;

      if (!isInDialog) {
        closeApprovalPreviewModal();
      }
    });
  }
</script>
