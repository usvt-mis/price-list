<!--
  Sales Quote Approval Preview Modal
  Fullscreen modal for Sales Directors to preview and approve/reject quotes
-->
<div
  id="approvalPreviewModal"
  class="sq-modal-overlay fixed inset-0 z-[100] flex items-center justify-center opacity-0 transition-opacity duration-300"
  role="dialog"
  aria-modal="true"
  aria-labelledby="approvalPreviewTitle"
>
  <div class="salesquotes-modal-shell sq-modal-panel w-full max-w-4xl max-h-[90vh] flex flex-col m-4">
    <!-- Modal Header -->
    <div class="sq-modal-header flex items-center justify-between gap-4">
      <div>
        <p class="sales-alert-status sales-alert-status-neutral">Approval Workspace</p>
        <h2 id="approvalPreviewTitle" class="text-lg font-semibold text-slate-900">
          Sales Quote Approval
        </h2>
      </div>
      <button
        type="button"
        id="btnCloseApprovalPreview"
        class="sq-icon-btn"
        aria-label="Close"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Modal Content (Quote Preview) -->
    <div id="approvalPreviewContent" class="overflow-y-auto flex-1">
      <!-- Quote content will be loaded here -->
    </div>

    <!-- Modal Actions -->
    <div id="approvalPreviewActions">
      <!-- Action buttons will be rendered here -->
    </div>
  </div>
</div>

<script type="module">
  import { closeApprovalPreviewModal } from '../../../../js/salesquotes/approvals.js';

  // Close button handler
  const closeBtn = document.getElementById('btnCloseApprovalPreview');
  if (closeBtn) {
    closeBtn.addEventListener('click', closeApprovalPreviewModal);
  }

  // Close on backdrop click
  const modal = document.getElementById('approvalPreviewModal');
  if (modal) {
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeApprovalPreviewModal();
      }
    });
  }

  // Close on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.getElementById('approvalPreviewModal')) {
      closeApprovalPreviewModal();
    }
  });
</script>
