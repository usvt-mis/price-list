<!-- Confirm Remove Modal -->
<div id="confirmRemoveModal" class="sales-alert-modal fixed inset-0 hidden z-[100] transition-opacity duration-200">
  <div class="sales-alert-dialog">
    <div id="confirmRemoveModalContent" class="sales-alert-panel transform transition-all duration-200 opacity-0 translate-y-[-10px]">
      <div class="sales-alert-header">
        <p class="sales-alert-status sales-alert-status-danger">Confirm Action</p>
        <h3 class="sales-alert-title">Remove Quote Line</h3>
        <p class="sales-alert-text">This line will be removed from the quote. This action cannot be undone.</p>
      </div>

      <div class="sales-alert-footer">
        <button
          id="cancelRemoveBtn"
          class="sales-alert-btn"
          onclick="window.cancelRemoveLine()"
        >
          Cancel
        </button>
        <button
          id="confirmRemoveBtn"
          class="sales-alert-btn sales-alert-btn-danger"
          onclick="window.confirmRemoveLine()"
        >
          Remove
        </button>
      </div>
    </div>
  </div>
</div>
