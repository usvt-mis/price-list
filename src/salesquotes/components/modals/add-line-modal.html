<!-- Add Line Modal -->
<div id="addLineModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] transition-opacity duration-300">
  <div class="flex items-center justify-center min-h-screen p-4">
    <div id="addLineModalContent" class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full transform transition-all duration-300 opacity-0 translate-y-[-10px]">
      <div class="p-6 border-b border-slate-200">
        <div class="flex items-center gap-3">
          <div class="flex items-center justify-center w-10 h-10 bg-indigo-50 rounded-xl">
            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
          </div>
          <div>
            <h3 id="addLineModalTitle" class="text-lg font-semibold text-gray-900">Add Quote Line</h3>
            <p id="addLineModalSubtitle" class="text-sm text-gray-500">Search items and add to quote</p>
          </div>
        </div>
      </div>

      <div class="p-6 max-h-[calc(100vh-200px)] overflow-y-auto">
        <!-- ROW 1: Type (1), Group No (1), New SER (1), Serv. Item No (1), Serv. Item Desc (2) -->
        <div class="grid grid-cols-6 gap-4 mb-4">
          <div class="col-span-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Type <span class="required-asterisk">*</span></label>
            <select id="lineType" class="w-full rounded-lg border-slate-200 shadow-sm px-2 py-2.5 text-sm">
              <option value="Item">Item</option>
              <option value="Comment">Comment</option>
            </select>
          </div>
          <div class="col-span-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Group No</label>
            <input type="number" id="lineUsvtGroupNo" class="w-full rounded-lg border-slate-200 shadow-sm px-2 py-2.5 text-sm" value="1" placeholder="0">
          </div>
          <div class="col-span-1 flex items-center justify-center">
            <label class="toggle-label-vertical">
              <span class="block text-sm font-medium text-gray-700 text-center"></span>
              <button type="button" id="lineCreateSv" class="h-8 px-3 text-xs font-semibold rounded-lg bg-gradient-to-r from-amber-500 to-orange-500 text-white hover:from-amber-600 hover:to-orange-600 shadow-md hover:shadow-lg hover:scale-105 active:scale-95 transition-all">
                New SER
              </button>
            </label>
          </div>
          <div class="col-span-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Serv. Item No</label>
            <input type="text" id="lineUsvtServiceItemNo" class="w-full rounded-lg border-slate-200 shadow-sm px-2 py-2.5 text-sm">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Serv. Item Desc</label>
            <input type="text" id="lineUsvtServiceItemDescription" class="w-full rounded-lg border-slate-200 shadow-sm px-2 py-2.5 text-sm">
          </div>
        </div>

        <!-- ROW 2: No (2), Desc (4) -->
        <div class="grid grid-cols-6 gap-4 mb-4">
          <div class="col-span-2 relative">
            <label class="block text-sm font-medium text-gray-700 mb-1">No. <span class="required-asterisk">*</span></label>
            <input type="text" id="lineObjectNumberSearch" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5" placeholder="Search materials..." autocomplete="off">
            <div id="lineMaterialDropdown" class="search-dropdown hidden"></div>
          </div>
          <div class="col-span-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="required-asterisk">*</span></label>
            <input type="text" id="lineDescription" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5" placeholder="Line description...">
          </div>
        </div>

        <!-- ROW 3: Qty (1), Unit Price (2), Disc. % (1), Discount Amt. (2) -->
        <div class="grid grid-cols-6 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Qty. <span class="required-asterisk">*</span></label>
            <input type="number" id="lineQuantity" class="w-full rounded-lg border-slate-200 shadow-sm px-3 py-2.5" value="1" min="1">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price</label>
            <input type="number" id="lineUnitPrice" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5" value="0" min="0" step="0.01">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Disc. %</label>
            <input type="text" id="lineDiscountPercent" inputmode="decimal" pattern="[0-9]*\.?[0-9]{0,1}" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5" value="0" placeholder="0.0">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Discount Amt.</label>
            <input type="text" id="lineDiscountAmount" inputmode="decimal" pattern="[0-9]*\.?[0-9]{0,2}" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5" value="0" placeholder="0.00">
          </div>
        </div>

        <!-- ROW 4: Addition (1), Ref. SQ No. (2), Line Total (3) -->
        <div class="grid grid-cols-6 gap-4 mb-4">
          <div class="flex items-center justify-center">
            <label class="toggle-label-vertical">
              <span class="block text-sm font-medium text-gray-700 text-center">Addition</span>
              <label class="toggle-switch">
                <input type="checkbox" id="lineUsvtAddition">
                <span class="toggle-slider"></span>
              </label>
            </label>
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Ref. SQ No.</label>
            <input type="text" id="lineUsvtRefSalesQuoteno" class="w-full rounded-lg border-slate-200 shadow-sm px-4 py-2.5">
          </div>
          <div class="col-span-3 bg-gradient-to-r from-indigo-50 to-purple-50 border border-indigo-200 rounded-xl px-4 py-3">
            <div class="flex justify-between items-center">
              <span class="font-medium text-indigo-900">Line Total:</span>
              <span id="lineTotalPreview" class="text-lg font-bold text-indigo-600">0.00</span>
            </div>
          </div>
        </div>
      </div>

      <div class="p-6 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 rounded-b-2xl">
        <button
          class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-500 to-indigo-600 text-white rounded-lg px-6 py-2.5 font-semibold shadow-md hover:shadow-lg hover:scale-105 active:scale-95 transition-all duration-200"
          onclick="window.addQuoteLine()"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          Add Line
        </button>
        <button
          class="inline-flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 rounded-lg px-4 py-2.5 font-medium hover:bg-slate-50 transition-all duration-200"
          onclick="window.closeAddLineModal()"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
