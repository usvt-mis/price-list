<!-- No Branch Assigned Modal - Blocks page until user has a branch assigned -->
<div id="noBranchModal" class="sales-alert-modal fixed inset-0 hidden z-[200] transition-opacity duration-200">
  <div class="sales-alert-dialog">
    <div id="noBranchModalContent" class="sales-alert-panel transform transition-all duration-200 opacity-0 translate-y-[-10px]">
      <div class="sales-alert-header">
        <p class="sales-alert-status sales-alert-status-danger">Access Required</p>
        <h3 class="sales-alert-title">ไม่พบ Branch ของท่าน</h3>
        <p class="sales-alert-text">ท่านยังไม่มีสิทธิ์สร้าง Sales Quotes เนื่องจากยังไม่ได้รับการมอบหมาย Branch ในระบบ</p>
      </div>

      <div class="sales-alert-body">
        <div id="noBranchUserEmailBox" class="sales-alert-section hidden">
          <p class="sales-alert-label">Email ผู้ใช้งาน</p>
          <p id="noBranchUserEmail" class="sales-alert-value"></p>
        </div>
        <div class="sales-alert-section sales-alert-section-warning">
          <p class="sales-alert-label">กรุณาติดต่อ</p>
          <p class="sales-alert-value">Admin หรือ Manager เพื่อขอให้มอบหมาย Branch หรือรอสัญญาณยืนยันว่าได้รับการมอบหมายแล้ว</p>
        </div>
      </div>

      <div class="sales-alert-footer sales-alert-footer-centered">
        <button
          class="sales-alert-btn sales-alert-btn-primary"
          onclick="window.location.reload()"
        >
          ตรวจสอบใหม่ (Refresh)
        </button>
      </div>
    </div>
  </div>
</div>
