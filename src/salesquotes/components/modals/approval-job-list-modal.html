<!-- Approval Job List Modal -->
<div
  id="approvalJobListModal"
  class="sales-alert-modal fixed inset-0 hidden z-[170] transition-opacity duration-200"
  style="z-index: 170;"
  role="dialog"
  aria-modal="true"
  aria-labelledby="approvalJobListModalTitle"
>
  <div class="sales-alert-dialog">
    <div
      id="approvalJobListModalContent"
      class="sales-alert-panel approval-job-list-panel"
      style="opacity: 0; transform: translateY(-10px);"
    >
      <div class="sales-alert-header">
        <p id="approvalJobListModalStatus" class="sales-alert-status sales-alert-status-info">Job List</p>
        <h3 id="approvalJobListModalTitle" class="sales-alert-title">Service Item Jobs</h3>
        <p id="approvalJobListModalText" class="sales-alert-text">Read-only workshop job list for this Service Item.</p>
      </div>

      <div class="sales-alert-body approval-job-list-body">
        <div class="sales-alert-section sales-alert-section-info">
          <p class="sales-alert-label">Service Item</p>
          <p id="approvalJobListModalContextValue" class="sales-alert-value"></p>
          <p id="approvalJobListModalContextMeta" class="sales-alert-helper hidden"></p>
        </div>

        <div id="approvalJobListModalSummary" class="approval-job-list-summary"></div>
        <div id="approvalJobListModalPriceNote" class="approval-job-list-note hidden"></div>

        <div class="approval-job-list-table-wrap">
          <table class="approval-job-list-table">
            <thead>
              <tr>
                <th>Job</th>
                <th class="text-right">MH</th>
                <th class="text-right">Cost/Hour</th>
                <th class="text-right">Raw Cost</th>
                <th class="text-right">Calc Price</th>
              </tr>
            </thead>
            <tbody id="approvalJobListModalTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="sales-alert-footer">
        <button id="approvalJobListModalCloseBtn" type="button" class="sales-alert-btn sales-alert-btn-primary">
          Close
        </button>
      </div>
    </div>
  </div>
</div>
