<!-- Confirm Clear Quote Modal -->
<div id="confirmClearQuoteModal" class="sales-alert-modal fixed inset-0 hidden z-[100] transition-opacity duration-200">
  <div class="sales-alert-dialog">
    <div id="confirmClearQuoteModalContent" class="sales-alert-panel transform transition-all duration-200 opacity-0 translate-y-[-10px]">
      <div class="sales-alert-header">
        <p class="sales-alert-status sales-alert-status-warning">Confirm Action</p>
        <h3 class="sales-alert-title">Clear Quote?</h3>
        <p class="sales-alert-text">All unsaved changes in the current quote will be removed.</p>
      </div>

      <div class="sales-alert-footer">
        <button
          id="cancelClearQuoteBtn"
          class="sales-alert-btn"
          onclick="window.cancelClearQuote()"
        >
          Cancel
        </button>
        <button
          id="confirmClearQuoteBtn"
          class="sales-alert-btn sales-alert-btn-warning"
          onclick="window.confirmClearQuote()"
        >
          Clear Quote
        </button>
      </div>
    </div>
  </div>
</div>
