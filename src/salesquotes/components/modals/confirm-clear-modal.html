<!-- Confirm Clear Quote Modal -->
<div id="confirmClearQuoteModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[100] transition-opacity duration-300">
  <div class="flex items-center justify-center min-h-screen p-4">
    <div id="confirmClearQuoteModalContent" class="bg-white rounded-2xl shadow-2xl max-w-md w-full transform transition-all duration-300 opacity-0 translate-y-[-10px]">
      <!-- Header with Icon -->
      <div class="p-8 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-amber-100 rounded-full mb-4">
          <svg class="w-8 h-8 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
          </svg>
        </div>
        <h3 class="text-2xl font-bold text-gray-900 mb-2">Clear Quote?</h3>
        <p class="text-sm text-gray-600">Are you sure you want to clear the quote? All unsaved changes will be lost.</p>
      </div>

      <!-- Action Buttons -->
      <div class="p-6 border-t border-slate-200 bg-slate-50 flex justify-center gap-3 rounded-b-2xl">
        <button
          id="cancelClearQuoteBtn"
          class="inline-flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 rounded-lg px-6 py-3 font-medium hover:bg-slate-50 hover:border-slate-400 active:scale-95 transition-all duration-200 shadow-sm"
          onclick="window.cancelClearQuote()"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
          Cancel
        </button>
        <button
          id="confirmClearQuoteBtn"
          class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-amber-500 to-amber-600 text-white rounded-lg px-6 py-3 font-semibold shadow-md hover:shadow-lg hover:scale-105 active:scale-95 transition-all duration-200"
          onclick="window.confirmClearQuote()"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
          </svg>
          Clear Quote
        </button>
      </div>
    </div>
  </div>
</div>
