<!-- Confirm New SER Modal -->
<div id="confirmNewSerModal" class="sales-alert-modal fixed inset-0 hidden z-[150] transition-opacity duration-200" style="z-index: 150;">
  <div class="sales-alert-dialog">
    <div id="confirmNewSerModalContent" class="sales-alert-panel transform transition-all duration-200" style="opacity: 0; transform: translateY(-10px);">
      <div class="sales-alert-header">
        <p class="sales-alert-status sales-alert-status-info">Confirm Action</p>
        <h3 class="sales-alert-title">Create New Service Item?</h3>
        <p class="sales-alert-text">A new Service Item will be created from the description below.</p>
      </div>

      <div class="sales-alert-body">
        <div class="sales-alert-section sales-alert-section-info">
          <p class="sales-alert-label">Description</p>
          <p id="confirmNewSerDescription" class="sales-alert-value"></p>
        </div>
      </div>

      <div class="sales-alert-footer">
        <button
          class="sales-alert-btn"
          onclick="window.cancelNewSerCreation()"
        >
          Cancel
        </button>
        <button
          class="sales-alert-btn sales-alert-btn-primary"
          onclick="window.confirmNewSerCreation()"
        >
          Create Service Item
        </button>
      </div>
    </div>
  </div>
</div>
